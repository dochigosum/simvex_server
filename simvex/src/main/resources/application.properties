spring.application.name=simvex
server.port=8080

spring.jpa.database=mysql
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:validate}
spring.jpa.open-in-view=false
spring.jpa.generate-ddl=true
spring.jpa.properties.hibernate.format_sql=true

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_NAME}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${PASSWORD}

spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.lettuce.pool.max-active=8
spring.data.redis.lettuce.pool.max-idle=8

jwt.secret=${JWT_SECRET}
jwt.access-token-expiration=${JWT_ACCESS_EXPIRATION}

discord.webhook.url=${DISCORD_WEBHOOK_URL}

cloud.aws.s3.bucket=${BUCKET_NAME}
cloud.aws.s3.exp-time=604800000
cloud.aws.region.static=${AWS_STATIC}
cloud.aws.stack.auto=false

